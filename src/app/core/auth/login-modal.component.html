@if (loginModal.isOpen()) {
  <div
    class="login-modal-overlay"
    role="presentation"
    (click)="onBackdropClick($event)"
  >
    <div
      class="login-modal-dialog card"
      role="dialog"
      aria-modal="true"
      aria-labelledby="login-modal-title"
      (click)="$event.stopPropagation()"
    >
      <button
        class="btn-close"
        type="button"
        (click)="loginModal.close()"
        [attr.aria-label]="'common.close' | transloco"
      >
        ×
      </button>
      <div class="header">
        <div class="brand">{{ 'brand.fullName' | transloco }}</div>
        <h1 id="login-modal-title">{{ 'login.title' | transloco }}</h1>
        <p class="sub">{{ 'login.subtitle' | transloco }}</p>
      </div>

      <button class="btn btn-primary" type="button" (click)="signInWithGoogle()">
        {{ 'login.continueGoogle' | transloco }}
      </button>

      <div class="hint">
        {{ 'login.providersHint' | transloco }}
      </div>

      <app-dev-mock-login-panel />
    </div>
  </div>
}
